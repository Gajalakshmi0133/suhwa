{% extends "layout.html" %}
{% block content %}
<div class="container mt-5">
  <div class="row justify-content-center">
    <div class="col-md-8 col-lg-6">
      <div class="card shadow-sm">
        <div class="card-body p-5">
          <h2 class="fw-bold mb-2">Join the Suhwa Community</h2>
          <p class="text-muted mb-4">Empower your communication journey with our AI-driven sign language assistant.</p>
          <form method="post">
            <div class="row g-2">
              <div class="col-md-6">
                <div class="form-floating mb-3">
                  <input type="text" class="form-control" id="first_name" name="first_name" placeholder="First name" required>
                  <label for="first_name">First name</label>
                </div>
              </div>
              <div class="col-md-6">
                <div class="form-floating mb-3">
                  <input type="text" class="form-control" id="last_name" name="last_name" placeholder="Last name">
                  <label for="last_name">Last name</label>
                </div>
              </div>
            </div>

            <div class="row g-2">
              <div class="col-md-6">
                <div class="form-floating mb-3">
                  <input type="email" class="form-control" id="email" name="email" placeholder="you@example.com" required>
                  <label for="email">Email</label>
                </div>
              </div>
              <div class="col-md-6">
                <div class="form-floating mb-3">
                  <input type="text" class="form-control" id="username" name="username" placeholder="Username">
                  <label for="username">Username (optional)</label>
                </div>
              </div>
            </div>

            <div class="row g-2">
              <div class="col-md-6">
                <div class="form-floating mb-3">
                  <input type="date" class="form-control" id="dob" name="dob" placeholder="Date of birth">
                  <label for="dob">Date of birth</label>
                </div>
              </div>
              <div class="col-md-6">
                <div class="mb-3">
                  <label class="form-label">Gender</label>
                  <select class="form-select" name="gender">
                    <option value="">Prefer not to say</option>
                    <option value="female">Female</option>
                    <option value="male">Male</option>
                    <option value="other">Other</option>
                  </select>
                </div>
              </div>
            </div>

            <div class="row g-2">
              <div class="col-md-6">
                <div class="form-floating mb-3">
                  <input type="password" class="form-control" id="password" name="password" placeholder="Password" required>
                  <label for="password">Password</label>
                </div>
              </div>
              <div class="col-md-6">
                <div class="form-floating mb-3">
                  <input type="password" class="form-control" id="password2" name="password2" placeholder="Confirm password" required>
                  <label for="password2">Confirm password</label>
                </div>
              </div>
            </div>

            <div class="d-grid mt-4">
              <button class="btn btn-primary btn-lg shadow-sm" style="border-radius: 12px; font-weight: 600;">Join Suhwa Now</button>
            </div>

            <p class="small text-center mt-3 text-muted">Already have an account? <a href="{{ url_for('login') }}">Sign in</a></p>
          </form>
          <script>
            // client-side validation
            (function(){
              const form = document.currentScript.previousElementSibling;
              form.addEventListener('submit', function(e){
                const email = form.querySelector('input[name="email"]').value.trim();
                const p1 = form.querySelector('input[name="password"]').value;
                const p2 = form.querySelector('input[name="password2"]').value;
                const re = /^[^@\s]+@[^@\s]+\.[^@\s]+$/;
                if(!re.test(email)){
                  e.preventDefault(); alert('Please enter a valid email address.'); return false;
                }
                if(p1.length < 8){ e.preventDefault(); alert('Password must be at least 8 characters.'); return false; }
                if(p1 !== p2){ e.preventDefault(); alert('Passwords do not match.'); return false; }
                return true;
              });
            })();
          </script>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
