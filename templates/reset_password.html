{% extends "layout.html" %}
{% set no_footer = True %}
{% block content %}
<style>
    .reset-hero {
        min-height: 100vh;
        background: radial-gradient(circle at top right, #1e293b, #0f172a);
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 2rem 0;
    }
    .reset-card {
        border: none;
        border-radius: 24px;
        background: #ffffff;
        box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        padding: 3.5rem;
        max-width: 500px;
        width: 100%;
    }
    .btn-accent {
        background: #3b82f6;
        color: white;
        font-weight: 600;
        padding: 0.875rem;
        border-radius: 12px;
        border: none;
        transition: all 0.3s ease;
    }
    .btn-accent:hover {
        background: #2563eb;
    }
    .form-control-custom {
        background: #f8fafc;
        border: 2px solid #f1f5f9;
        border-radius: 12px;
        padding: 0.75rem 1rem;
    }
</style>

<div class="reset-hero">
    <div class="container d-flex justify-content-center">
        <div class="reset-card">
            <h3 class="fw-bold text-dark mb-2">Reset Password</h3>
            <p class="text-muted mb-4">Please enter your new password below.</p>
            
            <form method="post">
                <div class="mb-3">
                    <label class="form-label fw-bold">New Password</label>
                    <input type="password" name="password" class="form-control form-control-custom" placeholder="••••••••" required minlength="8">
                </div>
                <div class="mb-4">
                    <label class="form-label fw-bold">Confirm New Password</label>
                    <input type="password" name="confirm_password" class="form-control form-control-custom" placeholder="••••••••" required minlength="8">
                </div>
                <button type="submit" class="btn btn-accent w-100 mb-3">Update Password</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
