{% extends "layout.html" %}
{% set no_footer = True %}
{% block content %}
<style>
    .forgot-hero {
        min-height: 100vh;
        background: radial-gradient(circle at top right, #1e293b, #0f172a);
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 2rem 0;
    }
    .forgot-card {
        border: none;
        border-radius: 24px;
        background: #ffffff;
        box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        padding: 3.5rem;
        max-width: 500px;
        width: 100%;
    }
    .btn-accent {
        background: #3b82f6;
        color: white;
        font-weight: 600;
        padding: 0.875rem;
        border-radius: 12px;
        border: none;
        transition: all 0.3s ease;
    }
    .btn-accent:hover {
        background: #2563eb;
        transform: translateY(-1px);
    }
    .form-control-custom {
        background: #f8fafc;
        border: 2px solid #f1f5f9;
        border-radius: 12px;
        padding: 0.75rem 1rem;
    }
</style>

<div class="forgot-hero">
    <div class="container d-flex justify-content-center">
        <div class="forgot-card">
            <h3 class="fw-bold text-dark mb-2">Forgot Password?</h3>
            <p class="text-muted mb-4">Enter your email address and we'll send you a link to reset your password.</p>
            
            <form method="post" action="{{ url_for('forgot_password') }}">
                <div class="mb-4">
                    <label class="form-label fw-bold">Email Address</label>
                    <input type="email" name="email" class="form-control form-control-custom" placeholder="you@example.com" required>
                </div>
                <button type="submit" class="btn btn-accent w-100 mb-3">Send Reset Link</button>
                <div class="text-center">
                    <a href="{{ url_for('login') }}" class="text-decoration-none small text-primary fw-bold">Back to Login</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
