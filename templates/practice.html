{% extends "layout.html" %}
{% block content %}
<div class="container py-5">
  <h2>Practice Mode (MVP)</h2>
  <p class="lead">Practice signs selected by the AI. Start with a few basics.</p>
  <div class="row">
    <div class="col-md-8">
      <div style="background:#000; height:360px; color:#fff; display:flex; align-items:center; justify-content:center">Camera preview (placeholder)</div>
      <div class="mt-2">Prompt: <strong id="promptText">Show letter A</strong></div>
      <div class="mt-3">
        <button class="btn btn-primary">Check</button>
        <button class="btn btn-outline-secondary">Retry</button>
      </div>
    </div>
    <div class="col-md-4">
      <h5>Performance</h5>
      <p>Accuracy: <span id="accuracy">—</span></p>
      <p>Confidence: <span id="confidence">—</span></p>
    </div>
  </div>
</div>
{% endblock %}
